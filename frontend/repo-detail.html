<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Morixa Hub — Repository</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="api.js"></script>
  <style>
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px; display: flex; flex-direction: column; gap: 14px; }

    /* Repo header */
    .repo-header { display: flex; flex-direction: column; gap: 12px; }
    .breadcrumb  { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-2); flex-wrap: wrap; }
    .breadcrumb .owner  { color: var(--text-2); cursor: pointer; }
    .breadcrumb .owner:hover { color: var(--text-1); }
    .breadcrumb .sep    { color: var(--text-3); }
    .breadcrumb .rname  { font-weight: 600; color: var(--text-1); font-family: var(--mono); }
    .repo-desc-full { font-size: 13px; color: var(--text-2); line-height: 1.75; }
    .repo-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* Files table */
    .files-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .files-header .label { font-size: 13px; font-weight: 500; color: var(--text-1); display: flex; align-items: center; gap: 6px; }

    .files-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .files-table th { text-align: left; padding: 7px 10px; color: var(--text-3); font-weight: 500; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
    .files-table td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text-2); }
    .files-table tr:last-child td { border-bottom: none; }
    .files-table tr:hover td { background: var(--surface-2); }

    .file-name-cell { display: flex; align-items: center; gap: 8px; }
    .file-icon-wrap { width: 28px; height: 28px; border-radius: var(--radius); background: var(--surface-3); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .file-icon-wrap i { font-size: 14px; color: var(--text-2); }
    .file-name-text { color: var(--text-1); font-family: var(--mono); font-size: 12px; }
    .file-size { font-family: var(--mono); font-size: 12px; }

    /* Discussion */
    .discussion-title { font-size: 11px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .comment-item { display: flex; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .comment-item:last-child { border-bottom: none; }
    .comment-body { flex: 1; }
    .comment-author { font-weight: 600; font-size: 13px; color: var(--text-1); display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .comment-time { font-size: 11px; color: var(--text-3); font-weight: 400; font-family: var(--mono); }
    .comment-text { font-size: 13px; color: var(--text-2); line-height: 1.65; }
    .comment-form { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
    .comment-footer { display: flex; justify-content: flex-end; }

    /* Upload modal */
    .drop-zone {
      border: 1px dashed var(--border-3);
      border-radius: var(--radius-lg);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-3);
      transition: border-color 0.12s, background 0.12s;
    }
    .drop-zone:hover { border-color: var(--accent); background: var(--surface-2); color: var(--text-2); }
    .drop-zone i { font-size: 30px; display: block; margin-bottom: 8px; color: var(--text-3); }
    .drop-zone input { display: none; }

    .progress-bar { height: 2px; background: var(--surface-3); border-radius: 1px; margin-top: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }

    /* Empty state */
    .empty-state { text-align: center; padding: 40px; color: var(--text-3); }
    .empty-state i { font-size: 36px; display: block; margin-bottom: 10px; }

    
/* ── repo-detail.html ────────────────────────────────────── */
@media (max-width: 768px) {
  .files-table thead { display: none; } /* masquer headers de colonnes */
  .files-table td { display: block; padding: 4px 10px; }
  .files-table tr { display: block; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .files-table tr td:nth-child(2),
  .files-table tr td:nth-child(3),
  .files-table tr td:nth-child(4) { display: none; } /* garder seulement nom + bouton */
  .repo-actions { flex-wrap: wrap; gap: 6px; }
  .repo-actions .btn { flex: 1; justify-content: center; }
}

  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="logo">
    <div class="logo-box"><i class=""><img src="logo/logo.png" alt="" class="logo-box"></i></div>
    Morixa Hub
  </a>
  <div class="nav-links">
    <a href="/"><i class="ti ti-home"></i> Feed</a>
    <a href="/repositories.html" class="active"><i class="ti ti-folder"></i> Repositories</a>
    <a href="/chat.html"><i class="ti ti-message"></i> Messages</a>
    <a href="/notifications.html"><i class="ti ti-bell"></i> Notifications</a>
    <a href="/profile.html"><i class="ti ti-user"></i> Profile</a>
  </div>
</nav>

<div class="page-wrap">
  <!-- Header -->
  <div class="card repo-header">
    <div class="breadcrumb">
      <span class="owner" id="repo-owner" onclick="window.location='/profile.html'">—</span>
      <span class="sep">/</span>
      <span class="rname" id="repo-name">Loading...</span>
      <span class="tag tag-neutral" id="repo-type-tag">—</span>
      <span class="tag tag-neutral" id="repo-vis-tag">—</span>
    </div>
    <p class="repo-desc-full" id="repo-desc">—</p>
    <div class="repo-actions">
      <button class="btn" id="star-btn" onclick="starRepo()">
        <i class="ti ti-star"></i> Star <span id="star-count">0</span>
      </button>
      <button class="btn" onclick="forkRepo()">
        <i class="ti ti-git-fork"></i> Fork <span id="fork-count">0</span>
      </button>
      <button class="btn btn-primary" onclick="showUpload()">
        <i class="ti ti-upload"></i> Add file
      </button>
    </div>
  </div>

  <!-- Files -->
  <div class="card">
    <div class="files-header">
      <span class="label"><i class="ti ti-folder"></i> <span id="files-count">0</span> files</span>
      <div class="search-box" style="width:220px;">
        <i class="ti ti-search"></i>
        <input type="text" placeholder="Filter files..." id="file-search" oninput="filterFiles()">
      </div>
    </div>
    <table class="files-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Type</th>
          <th>Size</th>
          <th>Added</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="files-list">
        <tr><td colspan="5" style="text-align:center;color:var(--text-3);padding:20px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Discussion -->
  <div class="card">
    <div class="discussion-title">
      <i class="ti ti-messages"></i> Discussion
      <span style="font-weight:400;color:var(--text-3);" id="comment-count-label">(0)</span>
    </div>
    <div id="comments-list"></div>
    <div class="comment-form">
      <textarea class="field-input" id="comment-input" placeholder="Leave a comment..." style="min-height:80px;"></textarea>
      <div class="comment-footer">
        <button class="btn btn-primary" onclick="submitComment()">
          <i class="ti ti-send"></i> Post comment
        </button>
      </div>
    </div>
  </div>

</div>

<!-- Upload Modal -->
<div class="modal hidden" id="upload-modal">
  <div class="modal-box">
    <div class="modal-title"><i class="ti ti-cloud-upload"></i> Add a file</div>
    <div class="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="event.preventDefault()" ondrop="handleDrop(event)">
      <i class="ti ti-cloud-upload"></i>
      Drag & drop a file here, or <strong style="color:var(--text-1)">click to browse</strong>
      <div style="margin-top:6px;font-size:11px;font-family:var(--mono);">PDF · DOCX · XLSX · ZIP · PNG · JPG — max 50 MB</div>
      <input type="file" id="file-input" accept=".pdf,.docx,.xlsx,.zip,.png,.jpg,.jpeg,.dicom" onchange="previewFile(this)">
    </div>
    <div id="file-preview" style="margin-top:10px;font-size:12px;color:var(--text-2);font-family:var(--mono);"></div>
    <div class="progress-bar hidden" id="upload-bar"><div class="progress-fill" id="upload-fill"></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeUpload()">Cancel</button>
      <button class="btn btn-primary" onclick="uploadFile()"><i class="ti ti-upload"></i> Upload</button>
    </div>
  </div>
</div>

<script src="/api.js"></script>
<script>
  const FILE_ICONS = { pdf:"ti-file-type-pdf", docx:"ti-file-type-doc", xlsx:"ti-table", zip:"ti-file-zip", png:"ti-photo", jpg:"ti-photo", jpeg:"ti-photo", dicom:"ti-scan" };
  const TYPE_LABEL = { protocole:"Protocol", cas_clinique:"Clinical case", recherche:"Research", guide:"Guide" };
  const TYPE_TAG   = { protocole:"tag-proto", cas_clinique:"tag-cas", recherche:"tag-recherche", guide:"tag-article" };

  let repoId   = null;
  let isStarred = false;
  let allFiles = [];


async function init() {
  const params = new URLSearchParams(window.location.search);
  repoId = params.get("id");
  if (!repoId) { window.location.href = "/repositories.html"; return; }

  try {
    const repo = await apiFetch(`/repos/${repoId}?viewer_id=${getUserId()}`);
    renderHeader(repo);
    renderFiles(repo.files || []);
    allFiles = repo.files || [];
    await loadComments();
  } catch(e) {
    document.querySelector(".page-wrap").innerHTML =
      `<div class="empty-state"><i class="ti ti-wifi-off"></i><p>Could not load repository.</p></div>`;
  }
}

function renderHeader(r) {
  document.title = `Morixa Hub — ${r.name}`;

  const ownerEl = document.getElementById("repo-owner");
  ownerEl.textContent = r.owner?.full_name ? "Dr. " + r.owner.full_name : "Unknown";
  ownerEl.style.cursor = "pointer";
  ownerEl.onclick = () => { window.location.href = `/profile.html?id=${r.owner?.id}`; };

  document.getElementById("repo-name").textContent  = r.name;
  document.getElementById("repo-desc").textContent  = r.description || "No description.";
  document.getElementById("star-count").textContent = r.stars;
  document.getElementById("fork-count").textContent = r.forks;

  const tTag = document.getElementById("repo-type-tag");
  tTag.textContent = TYPE_LABEL[r.repo_type] || r.repo_type;
  tTag.className   = `tag ${TYPE_TAG[r.repo_type]||"tag-neutral"}`;

  const vTag = document.getElementById("repo-vis-tag");
  vTag.innerHTML = `<i class="ti ${r.is_public?'ti-world':'ti-lock'}" style="font-size:10px"></i> ${r.is_public?'Public':'Private'}`;

  // État réel du star, basé sur le backend (et plus un simple style local)
  isStarred = !!r.is_starred;
  updateStarBtn();
}

function updateStarBtn() {
  const btn = document.getElementById("star-btn");
  btn.classList.toggle("btn-primary", isStarred);
}

function renderFiles(files) {
  document.getElementById("files-count").textContent = files.length;
  if (!files.length) {
    document.getElementById("files-list").innerHTML =
      `<tr><td colspan="5"><div class="empty-state"><i class="ti ti-folder-off"></i><p>No files yet.</p></div></td></tr>`;
    return;
  }
  document.getElementById("files-list").innerHTML = files.map(f => {
    const ext  = (f.file_type||f.file_name?.split(".").pop()||"").toLowerCase();
    const icon = FILE_ICONS[ext] || "ti-file";
    const size = f.file_size ? formatSize(f.file_size) : "—";
    return `
      <tr>
        <td>
          <div class="file-name-cell">
            <div class="file-icon-wrap"><i class="ti ${icon}"></i></div>
            <span class="file-name-text">${f.file_name}</span>
          </div>
        </td>
        <td><span class="tag tag-neutral" style="font-family:var(--mono)">${ext.toUpperCase()}</span></td>
        <td class="file-size">${size}</td>
        <td style="font-size:11px;font-family:var(--mono);color:var(--text-3);">${f.created_at ? timeAgo(f.created_at) : "—"}</td>
        <td>
          <button class="btn btn-sm" onclick="downloadFile(${f.id}, '${f.file_name}')">
            <i class="ti ti-download"></i> Download
          </button>
        </td>
      </tr>`;
  }).join("");
}

  function filterFiles() {
    const q = document.getElementById("file-search").value.toLowerCase();
    renderFiles(allFiles.filter(f => f.file_name.toLowerCase().includes(q)));
  }

async function loadComments() {
  try {
    const data = await apiFetch(`/repos/${repoId}/comments`);  // ← /repos/ pas /posts/
    document.getElementById("comment-count-label").textContent = `(${data.length})`;
    if (!data.length) {
      document.getElementById("comments-list").innerHTML =
        `<div style="color:var(--text-3);font-size:13px;padding:8px 0;">
          No comments yet — start the discussion.
        </div>`;
      return;
    }
    document.getElementById("comments-list").innerHTML = data.map(c => {
      const ini = (c.author?.full_name||"?").split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2);
      return `
        <div class="comment-item">
          <div class="avatar">${ini}</div>
          <div class="comment-body">
            <div class="comment-author">
              Dr. ${c.author?.full_name||"Unknown"}
              <span class="comment-time">${timeAgo(c.created_at)}</span>
            </div>
            <div class="comment-text">${c.body}</div>
          </div>
        </div>`;
    }).join("");
  } catch(e) {}
}

async function submitComment() {
  const body = document.getElementById("comment-input").value.trim();
  if (!body) return;
  try {
    await apiFetch(`/repos/${repoId}/comments`, {  // ← /repos/ pas /posts/
      method: "POST",
      body:   JSON.stringify({ user_id: getUserId(), body }),
    });
    document.getElementById("comment-input").value = "";
    await loadComments();
    showToast("+5 pts earned", "success");
  } catch(e) { alert("Could not post comment."); }
}

async function starRepo() {
  const btn = document.getElementById("star-btn");
  btn.disabled = true;
  try {
    const data = await apiFetch(`/repos/${repoId}/star`, {
      method: "POST",
      body: JSON.stringify({ user_id: getUserId() }),
    });
    document.getElementById("star-count").textContent = data.stars;
    isStarred = data.is_starred;
    updateStarBtn();
  } catch(e) {
    alert("Could not update star.");
  } finally {
    btn.disabled = false;
  }
}

  async function forkRepo() {
  const btn = document.querySelector('[onclick="forkRepo()"]');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader-2" style="animation:spin 0.7s linear infinite"></i> Forking...';
  try {
    const data = await apiFetch(`/repos/${repoId}/fork`, {
      method: "POST",
      body:   JSON.stringify({ user_id: getUserId() }),
    });
    document.getElementById("fork-count").textContent = data.forks;
    btn.innerHTML = '<i class="ti ti-git-fork"></i> Forked!';
    btn.style.color = "var(--tag-art-fg)";
    // Redirect to the fork
    setTimeout(() => window.location.href = `/repo-detail.html?id=${data.fork_id}`, 1200);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-git-fork"></i> Fork <span id="fork-count">' + document.getElementById("fork-count").textContent + '</span>';
    alert(e.error || "Could not fork repository.");
  }
}

  function showUpload()  { document.getElementById("upload-modal").classList.remove("hidden"); }
  function closeUpload() { document.getElementById("upload-modal").classList.add("hidden"); }
  function handleDrop(e) { e.preventDefault(); document.getElementById("file-input").files = e.dataTransfer.files; previewFile(document.getElementById("file-input")); }

  function previewFile(input) {
    const f = input.files[0];
    if (!f) return;
    document.getElementById("file-preview").textContent = `Selected: ${f.name} (${formatSize(f.size)})`;
  }

async function uploadFile() {
  const input = document.getElementById("file-input");
  if (!input.files.length) return alert("Please select a file.");

  const bar  = document.getElementById("upload-bar");
  const fill = document.getElementById("upload-fill");
  bar.classList.remove("hidden");
  fill.style.width = "30%";

  try {
    const fd = new FormData();
    fd.append("file",    input.files[0]);
    fd.append("user_id", getUserId());
    fd.append("repo_id", repoId);

    // ← Utilise API_BASE au lieu de localhost hardcodé
    const res  = await fetch(`${API_BASE}/files/upload`, {
      method:  "POST",
      headers: { "Authorization": `Bearer ${getToken()}` },
      body:    fd,
    });

    fill.style.width = "80%";

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "Upload failed" }));
      throw err;
    }

    fill.style.width = "100%";

    setTimeout(async () => {
      closeUpload();
      bar.classList.add("hidden");
      fill.style.width = "0%";
      // Recharger la liste des fichiers
      const repo = await apiFetch(`/repos/${repoId}?viewer_id=${getUserId()}`);
      allFiles   = repo.files || [];
      renderFiles(allFiles);
      showToast("File uploaded successfully!", "success");
    }, 500);

  } catch(e) {
    bar.classList.add("hidden");
    fill.style.width = "0%";
    showToast(e.error || "Upload failed. Please try again.", "error");
  }

  input.value = "";
}

  function formatSize(b) {
    if (b > 1048576) return (b/1048576).toFixed(1)+" MB";
    if (b > 1024)    return (b/1024).toFixed(0)+" KB";
    return b+" B";
  }

  function timeAgo(s) {
    const d=(Date.now()-new Date(s))/1000;
    if(d<60) return "just now";
    if(d<3600) return `${Math.floor(d/60)}m ago`;
    if(d<86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }

async function downloadFile(fileId, fileName) {
  try {
    const res = await fetch(`${API_BASE}/files/download/${fileId}`, {
      headers: { "Authorization": `Bearer ${getToken()}` }
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: "Download failed" }));
      return showToast(err.error || "Download failed", "error");
    }
    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = fileName;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    showToast("Could not download file.", "error");
  }
}

  init();
</script>

  <a href="/"><i class="ti ti-home"></i>Feed</a>
  <a href="/repositories.html" class="active"><i class="ti ti-folder"></i>Repos</a>

  <a href="/notifications.html"><i class="ti ti-bell"></i>Alerts</a>
  <a href="/profile.html"><i class="ti ti-user"></i>Profile</a>
</nav>
</body>
</html>
