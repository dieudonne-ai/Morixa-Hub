<!--
  MedHub - Detailed Frontend Pages
  File structure:
    index.html         <- main feed
    repo-detail.html   <- repository detail view
    chat.html          <- real-time messaging
    post-create.html   <- post creation & file upload
    api.js             <- API layer (fetch to Flask backend)
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morixa Hub — Feed</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="api.js"></script>
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .app-body { display: flex; flex: 1; overflow: hidden; }
    .main { flex: 1; display: flex; overflow: hidden; }

    /* Feed */
    .feed-wrap { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

    /* Topbar */
    .topbar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 10px 14px; }

    /* Composer */
    .composer { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 14px; display: flex; gap: 10px; align-items: center; }
    .composer-input { flex: 1; font-size: 13px; color: var(--text-3); padding: 8px 12px; background: var(--surface-2); border-radius: var(--radius); border: 1px solid var(--border-2); cursor: pointer; transition: border-color 0.12s; font-family: var(--font); }
    .composer-input:hover { border-color: var(--border-3); color: var(--text-2); }

    /* Post card */
    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 16px 18px; transition: border-color 0.15s; }
    .post-card:hover { border-color: var(--border-2); }
    .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .post-author { font-size: 13px; font-weight: 500; color: var(--text-1); }
    .post-detail { font-size: 12px; color: var(--text-2); display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
    .post-title { font-size: 14px; font-weight: 600; color: var(--text-1); margin-bottom: 7px; cursor: pointer; letter-spacing: -0.01em; transition: color 0.12s; }
    .post-title:hover { color: var(--accent-dim); }
    .post-body { font-size: 13px; color: var(--text-2); line-height: 1.7; margin-bottom: 14px; }
    .post-actions { display: flex; align-items: center; gap: 2px; border-top: 1px solid var(--border); padding-top: 10px; }
    .action-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: var(--radius); font-size: 12px; color: var(--text-2); cursor: pointer; border: none; background: transparent; transition: all 0.12s; font-family: var(--font); }
    .action-btn:hover { background: var(--surface-2); color: var(--text-1); }
    .action-btn.liked { color: var(--tag-cas-fg); }
    .action-btn i { font-size: 15px; }
    .views-count { margin-left: auto; font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 4px; font-family: var(--mono); }

    /* Comments */
    .comments-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; flex-direction: column; gap: 8px; }
    .comments-section.open { display: flex; }
    .comment-item { display: flex; gap: 8px; }
    .comment-bubble { flex: 1; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--text-2); line-height: 1.5; }
    .comment-author-name { font-weight: 600; font-size: 12px; color: var(--text-1); margin-bottom: 2px; }
    .comment-input-row { display: flex; gap: 6px; margin-top: 4px; }
    .comment-input-row input { flex: 1; padding: 7px 10px; border: 1px solid var(--border-2); border-radius: var(--radius); font-size: 12px; outline: none; background: var(--surface-2); color: var(--text-1); font-family: var(--font); }
    .comment-input-row input:focus { border-color: var(--border-3); }
    .comment-input-row button { padding: 7px 12px; background: var(--accent); color: var(--bg); border: none; border-radius: var(--radius); font-size: 12px; cursor: pointer; font-weight: 600; }

    /* Right sidebar */
    .sidebar-right { width: 240px; padding: 20px 14px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex-shrink: 0; border-left: 1px solid var(--border); }
    .pts-number { font-size: 28px; font-weight: 700; color: var(--text-1); text-align: center; font-family: var(--mono); letter-spacing: -0.04em; }
    .pts-label { font-size: 12px; color: var(--text-3); text-align: center; margin-bottom: 8px; }
    .pts-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-2); padding: 4px 0; border-bottom: 1px solid var(--border); }
    .pts-row:last-child { border-bottom: none; }
    .pts-row span:last-child { color: var(--text-1); font-weight: 500; font-family: var(--mono); }
    .lb-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .lb-item:last-child { border-bottom: none; }
    .lb-rank { font-size: 12px; font-weight: 700; width: 16px; font-family: var(--mono); }
    .lb-name { flex: 1; font-size: 13px; color: var(--text-1); }
    .lb-pts { font-size: 12px; color: var(--text-2); font-family: var(--mono); }

    /* Sidebar user */
    .user-name { font-size: 13px; font-weight: 500; color: var(--text-1); }
    .user-level { font-size: 11px; color: var(--text-3); font-family: var(--mono); }

    /* Load more */
    .load-more { text-align: center; padding: 8px; }
    .load-more button { background: var(--surface); border: 1px solid var(--border-2); border-radius: var(--radius); padding: 8px 20px; font-size: 13px; cursor: pointer; color: var(--text-2); font-family: var(--font); transition: all 0.12s; }
    .load-more button:hover { background: var(--surface-2); color: var(--text-1); }

    /* Skeleton */
    .skeleton-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="logo">
    <div class="logo-box"><i class=""><img src="logo/logo.png" alt="" class="logo-box"></i></div>
    Morixa Hub
  </a>
  <div class="nav-links">
    <a href="/" class="active"><i class="ti ti-home"></i> Feed</a>
    <a href="/repositories.html"><i class="ti ti-folder"></i> Repositories</a>
    <a href="/chat.html"><i class="ti ti-message"></i> Messages
      <span class="badge-count" id="msg-badge" style="display:none"></span>
    </a>
    <a href="/notifications.html"><i class="ti ti-bell"></i> Notifications
      <span class="badge-count" id="notif-badge" style="display:none"></span>
    </a>
    <a href="/profile.html"><div class="nav-avatar" id="nav-avatar">?</div></a>
  </div>
</nav>

<div class="app-body">

  <!-- Left sidebar -->
  <aside class="sidebar">
    <a href="/" class="nav-item active"><i class="ti ti-home"></i> Feed</a>
    <a href="/repositories.html" class="nav-item"><i class="ti ti-folder"></i> Repositories</a>
    <a href="/chat.html" class="nav-item"><i class="ti ti-message"></i> Messages</a>
    <a href="/notifications.html" class="nav-item"><i class="ti ti-bell"></i> Notifications</a>
    <a href="/profile.html" class="nav-item"><i class="ti ti-user"></i> My Profile</a>
    <a href="/post-create.html" class="nav-item"><i class="ti ti-edit"></i> New Post</a>
    <div class="sidebar-bottom">
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div>
          <div class="user-name" id="sidebar-name">Loading...</div>
          <div class="user-level" id="sidebar-level">—</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="feed-wrap">

      <!-- Topbar -->
      <div class="topbar">
        <div class="search-box" style="flex:1;">
          <i class="ti ti-search"></i>
          <input type="text" id="search-input" placeholder="Search cases, protocols, physicians..." oninput="debounceSearch()">
        </div>
        <a href="/post-create.html" class="btn btn-primary"><i class="ti ti-plus"></i> Publish</a>
      </div>

      <!-- Composer -->
      <div class="composer">
        <div class="avatar" id="composer-avatar">?</div>
        <div class="composer-input" onclick="window.location='/post-create.html'">
          Share a clinical case, protocol or research article...
        </div>
        <a href="/post-create.html" class="btn btn-primary"><i class="ti ti-edit"></i> New post</a>
      </div>

      <!-- Filters -->
      <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="filter-btn active" onclick="setFilter(this,'')">All</button>
        <button class="filter-btn" onclick="setFilter(this,'cas_clinique')">Clinical cases</button>
        <button class="filter-btn" onclick="setFilter(this,'protocole')">Protocols</button>
        <button class="filter-btn" onclick="setFilter(this,'recherche')">Research</button>
        <button class="filter-btn" onclick="setFilter(this,'article')">Articles</button>
      </div>

      <div id="posts-container"></div>

      <div class="load-more" id="load-more" style="display:none;">
        <button onclick="loadMore()"><i class="ti ti-chevron-down"></i> Load more</button>
      </div>
    </div>

    <!-- Right sidebar -->
    <aside class="sidebar-right">
      <div class="widget">
        <div class="widget-title"><i class="ti ti-trophy"></i> My Points</div>
        <div class="pts-number" id="w-pts">—</div>
        <div class="pts-label" id="w-level">—</div>
        <div class="level-bar"><div class="level-fill" id="w-bar" style="width:0%"></div></div>
        <div class="level-info"><span id="w-cur-level">—</span><span id="w-next-level">—</span></div>
        <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:12px;">
          <div class="pts-row"><span>Publication</span><span>+15</span></div>
          <div class="pts-row"><span>Comment</span><span>+5</span></div>
          <div class="pts-row"><span>File shared</span><span>+10</span></div>
          <div class="pts-row"><span>Like received</span><span>+3</span></div>
        </div>
      </div>
      <div class="widget">
        <div class="widget-title"><i class="ti ti-chart-bar"></i> Leaderboard</div>
        <div id="leaderboard-list"><div style="color:var(--text-3); font-size:13px;">Loading...</div></div>
      </div>
    </aside>
  </div>
</div>

<script src="/api.js"></script>
<script>
  const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? "http://localhost:5000/api"
  : "https://morixa-hub-api.onrender.com/api";
  let currentFilter = "", currentPage = 1, totalPages = 1, searchTimer = null;
  let likedPosts = new Set();

  const TYPE_LABELS = { cas_clinique:"Clinical case", protocole:"Protocol", recherche:"Research", article:"Article" };
  const LEVELS = [
    { name:"Intern",     min:0,    max:499   },
    { name:"Resident",   min:500,  max:1999  },
    { name:"Specialist", min:2000, max:4999  },
    { name:"Professor",  min:5000, max:99999 },
  ];

  (async function init() {
    loadUser();
    await Promise.all([loadPosts(), loadLeaderboard(), loadUnreadCounts()]);
  })();

  function loadUser() {
    const u = getUser();
    if (!u.full_name) return;
    const initials = u.full_name.split(" ").map(p=>p[0]).join("").toUpperCase().slice(0,2);
    ["nav-avatar","sidebar-avatar","composer-avatar"].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = initials;
    });
    document.getElementById("sidebar-name").textContent  = "Dr. " + u.full_name;
    document.getElementById("sidebar-level").textContent = `${u.level||"Intern"} · ${(u.total_points||0).toLocaleString()} pts`;
    const pts  = u.total_points || 0;
    const lvl  = LEVELS.find(l => pts >= l.min && pts <= l.max) || LEVELS[0];
    const next = LEVELS[LEVELS.indexOf(lvl)+1];
    const pct  = next ? Math.round(((pts-lvl.min)/(next.min-lvl.min))*100) : 100;
    document.getElementById("w-pts").textContent      = pts.toLocaleString();
    document.getElementById("w-level").textContent    = lvl.name + " level";
    document.getElementById("w-bar").style.width      = pct + "%";
    document.getElementById("w-cur-level").textContent = lvl.name;
    document.getElementById("w-next-level").textContent = next ? `${next.min.toLocaleString()} → ${next.name}` : "Max";
  }

  async function loadPosts(append=false) {
    if (!append) { currentPage=1; document.getElementById("posts-container").innerHTML=skeletons(3); }
    try {
      const params = { page:currentPage, per_page:10 };
      if (currentFilter) params.type = currentFilter;
      const q = document.getElementById("search-input").value.trim();
      if (q) params.search = q;
      const data = await apiFetch("/posts/?"+new URLSearchParams(params));
      totalPages = data.pages || 1;
      if (!append) document.getElementById("posts-container").innerHTML = "";
      if (!data.posts.length && !append) {
        document.getElementById("posts-container").innerHTML =
          `<div style="text-align:center;padding:60px;color:var(--text-3);">
            <i class="ti ti-file-off" style="font-size:40px;display:block;margin-bottom:12px;"></i>
            No posts found.
          </div>`;
        document.getElementById("load-more").style.display = "none";
        return;
      }
      data.posts.forEach(p => document.getElementById("posts-container").insertAdjacentHTML("beforeend", renderPost(p)));
      document.getElementById("load-more").style.display = currentPage < totalPages ? "block" : "none";
    } catch(e) {
      document.getElementById("posts-container").innerHTML =
        `<div style="text-align:center;padding:40px;color:var(--tag-cas-fg);">
          <i class="ti ti-wifi-off" style="font-size:32px;display:block;margin-bottom:8px;"></i>
          Could not load posts.
        </div>`;
    }
  }

  function renderPost(p) {
    const author   = p.author || {};
    const initials = (author.full_name||"?").split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2);
    const typeLabel = TYPE_LABELS[p.post_type] || p.post_type;
    const pts = {cas_clinique:15,protocole:15,recherche:25,article:20}[p.post_type]||15;
    const liked = likedPosts.has(p.id);
    return `
      <div class="post-card" id="post-${p.id}">
        <div class="post-header">
          <div class="avatar" style="cursor:pointer;" onclick="window.location='/profile.html?id=${author.id}'">${initials}</div>
          <div style="flex:1;">
            <div class="post-author" style="cursor:pointer;" onclick="window.location='/profile.html?id=${author.id}'">
              Dr. ${author.full_name||"Unknown"}
              ${author.verif_level && author.verif_level !== "none" ? renderVerifBadge(author.verif_level) : ""}
              ${author.specialty?`<span class="tag tag-neutral" style="margin-left:4px;">${author.specialty}</span>`:""}
              </div>
            <div class="post-detail">
              <span class="tag tag-${p.post_type}">${typeLabel}</span>
              · <span style="font-family:var(--mono)">${timeAgo(p.created_at)}</span>
            </div>
          </div>
          <span class="pts-badge">+${pts}</span>
        </div>
        <div class="post-title" onclick="window.location='/post.html?id=${p.id}'">${p.title}</div>
        <div class="post-body">${p.body.length>220?p.body.slice(0,220)+"…":p.body}</div>
        <div class="post-actions">
          <button class="action-btn ${liked?"liked":""}" id="like-btn-${p.id}" onclick="likePost(${p.id})">
            <i class="ti ${liked?"ti-heart-filled":"ti-heart"}"></i>
            <span id="like-count-${p.id}">${p.likes||0}</span>
          </button>
          <button class="action-btn" onclick="toggleComments(${p.id})">
            <i class="ti ti-message-circle"></i>
            <span id="cmt-count-${p.id}">${p.comments_count||0}</span>
          </button>
          <button class="action-btn" onclick="sharePost(${p.id})">
            <i class="ti ti-share"></i> Share
          </button>
          <span class="views-count"><i class="ti ti-eye"></i> ${formatNum(p.views||0)}</span>
        </div>
        <div class="comments-section" id="comments-${p.id}">
          <div id="cmt-list-${p.id}"></div>
          <div class="comment-input-row">
            <input type="text" id="cmt-input-${p.id}" placeholder="Write a comment..." onkeydown="if(event.key==='Enter') submitComment(${p.id})">
            <button onclick="submitComment(${p.id})"><i class="ti ti-send"></i></button>
          </div>
        </div>
      </div>`;
  }

  async function likePost(id) {
    if (likedPosts.has(id)) return;
    try {
      const data = await apiFetch(`/posts/${id}/like`,{method:"POST",body:JSON.stringify({user_id:getUserId()})});
      likedPosts.add(id);
      document.getElementById(`like-count-${id}`).textContent = data.likes;
      const btn = document.getElementById(`like-btn-${id}`);
      btn.classList.add("liked");
      btn.querySelector("i").className = "ti ti-heart-filled";
      showToast("+3 pts for the author", "success");
    } catch(e) { showToast(e.error||"Could not like post.", "error"); }
  }

  async function toggleComments(id) {
    const s = document.getElementById(`comments-${id}`);
    s.classList.toggle("open");
    if (s.classList.contains("open")) await loadComments(id);
  }

  async function loadComments(pid) {
    const list = document.getElementById(`cmt-list-${pid}`);
    list.innerHTML = `<div style="color:var(--text-3);font-size:12px;padding:4px 0;">Loading...</div>`;
    try {
      const data = await apiFetch(`/posts/${pid}/comments`);
      if (!data.length) { list.innerHTML=`<div style="color:var(--text-3);font-size:12px;padding:4px 0;">No comments yet — be first.</div>`; return; }
      list.innerHTML = data.map(c=>{
        const ini=(c.author?.full_name||"?").split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2);
        return `<div class="comment-item">
          <div class="avatar" style="width:26px;height:26px;font-size:10px;">${ini}</div>
          <div class="comment-bubble">
            <div class="comment-author-name">Dr. ${c.author?.full_name||"Unknown"}</div>
            ${c.body}
          </div>
        </div>`;
      }).join("");
    } catch(e) { list.innerHTML=`<div style="color:var(--tag-cas-fg);font-size:12px;">Could not load comments.</div>`; }
  }

  async function submitComment(pid) {
    const input = document.getElementById(`cmt-input-${pid}`);
    const body  = input.value.trim();
    if (!body) return;
    try {
      await apiFetch(`/posts/${pid}/comment`,{method:"POST",body:JSON.stringify({user_id:getUserId(),body})});
      input.value = "";
      await loadComments(pid);
      const el = document.getElementById(`cmt-count-${pid}`);
      el.textContent = parseInt(el.textContent)+1;
      showToast("+5 pts earned", "success");
    } catch(e) { showToast(e.error||"Could not post comment.", "error"); }
  }

  function sharePost(id) {
    navigator.clipboard?.writeText(`${location.origin}/post.html?id=${id}`);
    showToast("Link copied to clipboard", "info");
  }

  async function loadLeaderboard() {
    try {
      const data = await apiFetch("/users/leaderboard");
      const me   = getUserId();
      const ranks = ["#d4a44a","#7a7a7a","#b07a5a","#555","#555"];
      document.getElementById("leaderboard-list").innerHTML = data.slice(0,5).map((u,i)=>`
        <div class="lb-item">
          <span class="lb-rank" style="color:${ranks[i]||'var(--text-3)'}">${i+1}</span>
          <div class="avatar" style="width:24px;height:24px;font-size:9px;">
            ${u.full_name.split(" ").map(x=>x[0]).join("").toUpperCase().slice(0,2)}
          </div>
          <span class="lb-name" ${u.id===me?'style="color:var(--accent);font-weight:600;"':''}>
            ${u.full_name.split(" ").slice(-1)[0]}${u.id===me?" (you)":""}
          </span>
          <span class="lb-pts">${(u.total_points||0).toLocaleString()}</span>
        </div>`).join("");
    } catch(e) { document.getElementById("leaderboard-list").innerHTML=`<div style="color:var(--text-3);font-size:12px;">Unavailable</div>`; }
  }

  async function loadUnreadCounts() {
    try {
      const notifs = await apiFetch(`/users/${getUserId()}/notifications`);
      const count  = notifs.filter(n=>!n.is_read).length;
      const b = document.getElementById("notif-badge");
      if (count>0) { b.textContent=count; b.style.display="inline"; }
    } catch(_) {}
  }

  function setFilter(btn, type) {
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = type;
    loadPosts();
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(()=>loadPosts(), 400);
  }

  function loadMore() { currentPage++; loadPosts(true); }

  function skeletons(n) {
    return Array(n).fill(`
      <div class="skeleton-card" style="margin-bottom:12px;">
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="skeleton" style="width:34px;height:34px;border-radius:50%;"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:6px;">
            <div class="skeleton" style="height:11px;width:35%;"></div>
            <div class="skeleton" style="height:9px;width:20%;"></div>
          </div>
        </div>
        <div class="skeleton" style="height:13px;width:75%;"></div>
        <div class="skeleton" style="height:50px;"></div>
        <div class="skeleton" style="height:9px;width:50%;"></div>
      </div>`).join("");
  }

  function formatNum(n) { return n>=1000?(n/1000).toFixed(1).replace(".0","")+"k":String(n); }
  function timeAgo(s) {
    const d=(Date.now()-new Date(s))/1000;
    if(d<60) return "just now";
    if(d<3600) return `${Math.floor(d/60)}m ago`;
    if(d<86400) return `${Math.floor(d/3600)}h ago`;
    return `${Math.floor(d/86400)}d ago`;
  }
  function showToast(msg, type="success") {
    const map={success:["ti-circle-check","toast-success"],error:["ti-alert-circle","toast-error"],info:["ti-info-circle","toast-info"]};
    const [icon,cls]=map[type]||map.info;
    const t=document.createElement("div");
    t.className=`toast ${cls}`;
    t.innerHTML=`<i class="ti ${icon}"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3500);
  }
</script>
</body>
</html>
